<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 800 290">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml" style="padding: 5px;">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @keyframes fadeInUp {
          from { opacity: 0; transform: translateY(12px); }
          to { opacity: 1; transform: translateY(0); }
        }
        .hero {
          animation: fadeInUp 0.6s ease-out both;
          width: 100%;
          padding: 32px 28px 32px 32px;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          background: linear-gradient(160deg, #0d1117 0%, #0a0a0a 50%, #0a0a0a 100%);
          border: 1px solid #1e293b;
          border-left: 4px solid #2563eb;
          border-radius: 10px;
          display: flex;
          gap: 28px;
          overflow: hidden;
        }
        .left { flex: 1; position: relative; z-index: 1; }
        .right {
          width: 240px;
          flex-shrink: 0;
          display: flex;
          align-items: center;
        }
        .greeting {
          font-size: 12px;
          font-weight: 500;
          color: #2563eb;
          letter-spacing: 3px;
          text-transform: uppercase;
          margin-bottom: 10px;
          font-family: 'Courier New', monospace;
        }
        .accent-line {
          width: 32px; height: 2px;
          background: #2563eb;
          margin-bottom: 14px;
        }
        .name {
          font-size: 36px;
          font-weight: 700;
          color: #f1f5f9;
          line-height: 1.1;
          margin-bottom: 6px;
        }
        .role {
          font-size: 14px;
          color: #64748b;
          margin-bottom: 16px;
        }
        .role span { color: #475569; }
        .bio {
          font-size: 13px;
          color: #94a3b8;
          line-height: 1.5;
        }
        .bio strong { color: #e2e8f0; }
        .location {
          margin-top: 14px;
          font-size: 11px;
          color: #475569;
          font-family: 'Courier New', monospace;
        }
        .dot {
          display: inline-block;
          width: 6px; height: 6px;
          background: #22c55e;
          border-radius: 50%;
          margin-right: 6px;
          vertical-align: middle;
        }
        .terminal {
          width: 100%;
          background: #0d1117;
          border: 1px solid #1e293b;
          border-radius: 8px;
          padding: 12px 14px;
          font-family: 'Courier New', monospace;
          font-size: 11px;
        }
        .terminal-header {
          display: flex;
          align-items: center;
          gap: 5px;
          margin-bottom: 10px;
          padding-bottom: 8px;
          border-bottom: 1px solid #1e293b;
        }
        .td { width: 8px; height: 8px; border-radius: 50%; }
        .td-r { background: #ef4444; }
        .td-y { background: #eab308; }
        .td-g { background: #22c55e; }
        .tt {
          margin-left: 6px;
          font-size: 10px;
          color: #475569;
        }
        .line { color: #94a3b8; line-height: 1.9; }
        .prompt { color: #22c55e; }
        .cmd { color: #e2e8f0; }
        .output { color: #64748b; }
        .hi { color: #60a5fa; }
      </style>
      <div class="hero">
        <div class="left">
          <div class="greeting">// hello world</div>
          <div class="accent-line"></div>
          <div class="name">Julio Facal</div>
          <div class="role">Backend Developer <span>·</span> Systems Integrator <span>·</span> API Architect</div>
          <div class="bio">
            Systems Analyst at <strong>Banco Bradesco</strong>. 10+ years building
            <strong>scalable, secure backend systems</strong> - from legacy
            modernization to platform integrations and process automation.
          </div>
          <div class="location"><span class="dot"></span>São Paulo, Brasil</div>
        </div>
        <div class="right">
          <div class="terminal">
            <div class="terminal-header">
              <div class="td td-r"></div>
              <div class="td td-y"></div>
              <div class="td td-g"></div>
              <span class="tt">~/.dev</span>
            </div>
            <div class="line"><span class="prompt">$</span> <span class="cmd">java --version</span></div>
            <div class="line"><span class="output">openjdk 21.0.2</span></div>
            <div class="line"><span class="prompt">$</span> <span class="cmd">mvn spring-boot:run</span></div>
            <div class="line"><span class="hi">[INFO]</span> <span class="output">Started in 1.8s</span></div>
            <div class="line"><span class="prompt">$</span> <span class="cmd">docker ps</span></div>
            <div class="line"><span class="output">3 containers running</span></div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>