<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 800 280">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .hero {
          width: 100%;
          padding: 40px 32px;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          background: linear-gradient(135deg, #0a0a0a 0%, #111827 50%, #0a0a0a 100%);
          border: 1px solid #1e293b;
          border-radius: 12px;
          position: relative;
          overflow: hidden;
        }
        .hero::before {
          content: '';
          position: absolute;
          top: 0; left: 0;
          width: 100%; height: 100%;
          background: radial-gradient(ellipse at 20% 50%, rgba(37, 99, 235, 0.08) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(37, 99, 235, 0.05) 0%, transparent 50%);
        }
        .content { position: relative; z-index: 1; }
        .greeting {
          font-size: 13px;
          font-weight: 500;
          color: #2563eb;
          letter-spacing: 3px;
          text-transform: uppercase;
          margin-bottom: 12px;
          font-family: 'Courier New', monospace;
        }
        .name {
          font-size: 42px;
          font-weight: 700;
          color: #f1f5f9;
          line-height: 1.1;
          margin-bottom: 8px;
        }
        .role {
          font-size: 16px;
          font-weight: 400;
          color: #64748b;
          margin-bottom: 24px;
        }
        .role span {
          color: #94a3b8;
        }
        .bio {
          font-size: 14px;
          color: #94a3b8;
          line-height: 1.6;
          max-width: 560px;
        }
        .bio strong { color: #e2e8f0; }
        .location {
          margin-top: 20px;
          font-size: 12px;
          color: #475569;
          font-family: 'Courier New', monospace;
        }
        .location .dot {
          display: inline-block;
          width: 6px; height: 6px;
          background: #22c55e;
          border-radius: 50%;
          margin-right: 6px;
          vertical-align: middle;
        }
        .accent-line {
          width: 40px; height: 2px;
          background: #2563eb;
          margin-bottom: 16px;
        }
      </style>
      <div class="hero">
        <div class="content">
          <div class="greeting">// hello world</div>
          <div class="accent-line"></div>
          <div class="name">Julio Facal</div>
          <div class="role">Backend Developer <span>·</span> Systems Integrator <span>·</span> API Architect</div>
          <div class="bio">
            Systems Analyst at <strong>Banco Bradesco</strong>. 10+ years turning complex requirements into <strong>scalable, secure backend solutions</strong>. Specialized in legacy modernization, platform integrations, and process automation.
          </div>
          <div class="location"><span class="dot"></span>São Paulo, Brasil</div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
