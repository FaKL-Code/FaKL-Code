<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 800 180">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .card {
          width: 100%;
          padding: 28px 28px;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          background: #fafafa;
          border: 1px solid #e2e8f0;
          border-radius: 10px;
        }
        .label {
          font-size: 10px;
          font-weight: 600;
          color: #2563eb;
          letter-spacing: 2px;
          text-transform: uppercase;
          margin-bottom: 16px;
          font-family: 'Courier New', monospace;
        }
        .certs {
          display: flex;
          flex-wrap: wrap;
          gap: 12px;
        }
        .cert {
          display: flex;
          align-items: center;
          gap: 10px;
          padding: 10px 16px;
          background: linear-gradient(135deg, rgba(37, 99, 235, 0.06), rgba(37, 99, 235, 0.01));
          border: 1px solid rgba(37, 99, 235, 0.18);
          border-radius: 8px;
        }
        .cert-icon {
          width: 28px; height: 28px;
          background: rgba(37, 99, 235, 0.1);
          border-radius: 6px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 12px;
          color: #2563eb;
          font-weight: 700;
          font-family: 'Courier New', monospace;
        }
        .cert-code {
          font-size: 13px;
          font-weight: 600;
          color: #0f172a;
          font-family: 'Courier New', monospace;
        }
        .cert-name {
          font-size: 10px;
          color: #64748b;
          margin-top: 1px;
        }
        .cert-year {
          font-size: 9px;
          color: #94a3b8;
          font-family: 'Courier New', monospace;
        }
      </style>
      <div class="card">
        <div class="label">// certifications</div>
        <div class="certs">
          <div class="cert">
            <div class="cert-icon">Az</div>
            <div class="cert-info">
              <div class="cert-code">AZ-104</div>
              <div class="cert-name">Azure Administrator</div>
              <div class="cert-year">Microsoft · 2025</div>
            </div>
          </div>
          <div class="cert">
            <div class="cert-icon">Az</div>
            <div class="cert-info">
              <div class="cert-code">AZ-900</div>
              <div class="cert-name">Azure Fundamentals</div>
              <div class="cert-year">Microsoft · 2024</div>
            </div>
          </div>
          <div class="cert">
            <div class="cert-icon">Dp</div>
            <div class="cert-info">
              <div class="cert-code">DP-900</div>
              <div class="cert-name">Data Fundamentals</div>
              <div class="cert-year">Microsoft · 2024</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
