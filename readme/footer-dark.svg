<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 800 130">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .card {
          width: 100%;
          padding: 24px 28px;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          background: linear-gradient(135deg, #0a0a0a 0%, #0f172a 100%);
          border: 1px solid #1e293b;
          border-radius: 10px;
          text-align: center;
        }
        .tagline {
          font-size: 12px;
          color: #64748b;
          margin-bottom: 12px;
          font-family: 'Courier New', monospace;
        }
        .cta {
          display: inline-block;
          padding: 10px 28px;
          font-size: 14px;
          font-weight: 600;
          color: #ffffff;
          background: #2563eb;
          border-radius: 8px;
          text-decoration: none;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          letter-spacing: 0.3px;
        }
        .footer-text {
          margin-top: 14px;
          font-size: 11px;
          color: #475569;
          font-family: 'Courier New', monospace;
        }
      </style>
      <div class="card">
        <div class="tagline">Graduado em Sistemas de Informação · FIAP</div>
        <span class="cta">See my full portfolio → facal.dev</span>
        <div class="footer-text">Backend · Integration · Architecture</div>
      </div>
    </div>
  </foreignObject>
</svg>
