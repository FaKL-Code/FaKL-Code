<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 800 340">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml" style="padding: 5px;">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .card {
          width: 100%;
          padding: 28px 28px;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          background: #ffffff;
          border: 1px solid #e2e8f0;
          border-radius: 10px;
        }
        .label {
          font-size: 10px;
          font-weight: 600;
          color: #2563eb;
          letter-spacing: 2px;
          text-transform: uppercase;
          margin-bottom: 20px;
          font-family: 'Courier New', monospace;
        }
        .timeline { position: relative; padding-left: 20px; }
        .timeline::before {
          content: '';
          position: absolute;
          left: 4px; top: 6px; bottom: 6px;
          width: 1px;
          background: #e2e8f0;
        }
        .item {
          position: relative;
          margin-bottom: 18px;
          padding-left: 16px;
        }
        .item:last-child { margin-bottom: 0; }
        .item::before {
          content: '';
          position: absolute;
          left: -19px; top: 7px;
          width: 8px; height: 8px;
          border-radius: 50%;
          background: #e2e8f0;
          border: 2px solid #2563eb;
        }
        .item.current::before {
          background: #2563eb;
          box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }
        .item-header {
          display: flex;
          align-items: baseline;
          gap: 8px;
          flex-wrap: wrap;
        }
        .role-name {
          font-size: 14px;
          font-weight: 600;
          color: #0f172a;
        }
        .company {
          font-size: 13px;
          color: #2563eb;
          font-weight: 500;
        }
        .period {
          font-size: 10px;
          color: #94a3b8;
          font-family: 'Courier New', monospace;
        }
        .desc {
          font-size: 12px;
          color: #475569;
          line-height: 1.5;
          margin-top: 4px;
          max-width: 600px;
        }
      </style>
      <div class="card">
        <div class="label">// experience</div>
        <div class="timeline">
          <div class="item current">
            <div class="item-header">
              <span class="role-name">Systems Analyst</span>
              <span class="company">Banco Bradesco S. A.</span>
              <span class="period">2023 - present</span>
            </div>
            <div class="desc">Modernization and maintenance of banking systems. Spring Boot microservices, cloud infrastructure, CI/CD pipelines.</div>
          </div>
          <div class="item">
            <div class="item-header">
              <span class="role-name">Systems Analyst</span>
              <span class="company">SIS Consultoria</span>
              <span class="period">2022 - 2023</span>
            </div>
            <div class="desc">Development and support for corporate financial systems. Java backend, SQL, SOAP integrations.</div>
          </div>
          <div class="item">
            <div class="item-header">
              <span class="role-name">Systems Analyst</span>
              <span class="company">Wipro do Brasil</span>
              <span class="period">2021 - 2022</span>
            </div>
            <div class="desc">Maintenance and evolution of banking applications. Java enterprise, SQL, agile practices.</div>
          </div>
          <div class="item">
            <div class="item-header">
              <span class="role-name">Developer</span>
              <span class="company">Freelance</span>
              <span class="period">2015 - 2021</span>
            </div>
            <div class="desc">Websites, web systems, and various applications. Java, Python, JavaScript, HTML/CSS.</div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>