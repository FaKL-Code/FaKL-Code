<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 800 60">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml" style="padding: 5px;">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @keyframes fadeInUp {
          from { opacity: 0; transform: translateY(12px); }
          to { opacity: 1; transform: translateY(0); }
        }
        .bar {
          animation: fadeInUp 0.6s ease-out both;
          width: 100%;
          padding: 12px 28px;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          background: #0a0a0a;
          border: 1px solid #1e293b;
          border-radius: 10px;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 12px;
        }
        .badge {
          display: inline-flex;
          align-items: center;
          gap: 6px;
          padding: 6px 14px;
          font-size: 11px;
          font-weight: 500;
          color: #93c5fd;
          background: rgba(37, 99, 235, 0.08);
          border: 1px solid rgba(37, 99, 235, 0.2);
          border-radius: 6px;
          font-family: 'Courier New', monospace;
          text-decoration: none;
        }
        .badge .icon {
          font-size: 13px;
        }
        .sep {
          width: 1px;
          height: 16px;
          background: #1e293b;
        }
      </style>
      <div class="bar">
        <a class="badge" href="https://facal.dev/">
          <span class="icon">◆</span> facal.dev
        </a>
        <div class="sep"></div>
        <a class="badge" href="https://www.linkedin.com/in/julio-facal-584888200/">
          <span class="icon">■</span> LinkedIn
        </a>
        <div class="sep"></div>
        <a class="badge" href="mailto:julio@facal.dev">
          <span class="icon">▸</span> julio@facal.dev
        </a>
      </div>
    </div>
  </foreignObject>
</svg>
