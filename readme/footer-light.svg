<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 800 100">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml" style="padding: 5px;">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @keyframes fadeInUp {
          from { opacity: 0; transform: translateY(12px); }
          to { opacity: 1; transform: translateY(0); }
        }
        .footer {
          animation: fadeInUp 0.6s ease-out both;
          width: 100%;
          padding: 18px 24px;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          background: linear-gradient(135deg, #ffffff, #f8fafc);
          border: 1px solid #e2e8f0;
          border-radius: 8px;
          text-align: center;
        }
        .cta {
          display: inline-block;
          padding: 8px 24px;
          font-size: 13px;
          font-weight: 600;
          color: #ffffff;
          background: #2563eb;
          border-radius: 6px;
          letter-spacing: 0.3px;
        }
        .sub {
          margin-top: 10px;
          font-size: 10px;
          color: #94a3b8;
          font-family: 'Courier New', monospace;
        }
      </style>
      <div class="footer">
        <span class="cta">facal.dev &#x2192;</span>
        <div class="sub">backend · integration · architecture</div>
      </div>
    </div>
  </foreignObject>
</svg>