<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 800 160">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml" style="padding: 5px;">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @keyframes fadeInUp {
          from { opacity: 0; transform: translateY(12px); }
          to { opacity: 1; transform: translateY(0); }
        }
        .card {
          animation: fadeInUp 0.6s ease-out both;
          width: 100%;
          padding: 24px 28px;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          background: #0a0a0a;
          border: 1px solid #1e293b;
          border-radius: 10px;
        }
        .header {
          display: flex;
          align-items: baseline;
          gap: 10px;
          margin-bottom: 16px;
        }
        .label {
          font-size: 10px;
          font-weight: 600;
          color: #2563eb;
          letter-spacing: 2px;
          text-transform: uppercase;
          font-family: 'Courier New', monospace;
        }
        .sublabel {
          font-size: 10px;
          color: #475569;
          font-family: 'Courier New', monospace;
        }
        .certs { display: flex; gap: 12px; }
        .cert {
          flex: 1;
          display: flex;
          align-items: center;
          gap: 12px;
          padding: 12px 16px;
          background: rgba(37, 99, 235, 0.05);
          border: 1px solid rgba(37, 99, 235, 0.15);
          border-radius: 8px;
        }
        .cert.featured {
          background: rgba(37, 99, 235, 0.1);
          border-color: rgba(37, 99, 235, 0.3);
        }
        .cert-icon {
          width: 32px; height: 32px;
          background: rgba(37, 99, 235, 0.15);
          border-radius: 6px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 12px;
          color: #60a5fa;
          font-weight: 700;
          font-family: 'Courier New', monospace;
          flex-shrink: 0;
        }
        .cert-code {
          font-size: 14px;
          font-weight: 600;
          color: #e2e8f0;
          font-family: 'Courier New', monospace;
        }
        .cert-name {
          font-size: 11px;
          color: #64748b;
          margin-top: 2px;
        }
        .cert-year {
          font-size: 10px;
          color: #475569;
          font-family: 'Courier New', monospace;
        }
      </style>
      <div class="card">
        <div class="header">
          <div class="label">// certifications</div>
          <div class="sublabel">- microsoft azure</div>
        </div>
        <div class="certs">
          <div class="cert featured">
            <div class="cert-icon">Az</div>
            <div>
              <div class="cert-code">AZ-104</div>
              <div class="cert-name">Azure Administrator</div>
              <div class="cert-year">2025</div>
            </div>
          </div>
          <div class="cert">
            <div class="cert-icon">Az</div>
            <div>
              <div class="cert-code">AZ-900</div>
              <div class="cert-name">Azure Fundamentals</div>
              <div class="cert-year">2024</div>
            </div>
          </div>
          <div class="cert">
            <div class="cert-icon">Dp</div>
            <div>
              <div class="cert-code">DP-900</div>
              <div class="cert-name">Data Fundamentals</div>
              <div class="cert-year">2024</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>